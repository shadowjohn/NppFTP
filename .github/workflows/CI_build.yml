name: CI_build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  maintained_windows_x64:

    runs-on: windows-2022
    timeout-minutes: 90

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

    - name: Build maintained x64 Release package
      shell: cmd
      run: build.bat -Arch x64 -Config Release

    - name: Archive maintained x64 package
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
          name: NppFTP-maintained-win64
          path: |
            _build\NppFTP-0.30.22-win64.zip
            _build\Release\NppFTP.dll

  publish_prerelease:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: maintained_windows_x64
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Download maintained x64 package
      uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
      with:
        name: NppFTP-maintained-win64
        path: release-assets

    - name: Publish GitHub pre-release
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        zip_path="$(find release-assets -type f -name 'NppFTP-*-win64.zip' -print -quit)"
        dll_path="$(find release-assets -type f -name 'NppFTP.dll' -print -quit)"
        test -n "$zip_path"
        test -n "$dll_path"
        gh release create "$GITHUB_REF_NAME" "$zip_path" "$dll_path" \
          --repo "$GITHUB_REPOSITORY" \
          --title "NppFTP $GITHUB_REF_NAME" \
          --prerelease \
          --generate-notes
